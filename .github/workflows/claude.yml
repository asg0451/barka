name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Ensure Anthropic credentials
        env:
          HAS_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: |
          if [ "$HAS_API_KEY" != "true" ] && [ "$HAS_OAUTH" != "true" ]; then
            echo '::error::Claude Code needs ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN. Add one under Settings → Secrets and variables → Actions (repository or organization).'
            exit 1
          fi

      - name: Resolve PR head for checkout
        id: pr_head
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload;
            let ref = "";

            if (payload.pull_request) {
              ref = payload.pull_request.head.sha;
            } else if (payload.issue?.pull_request) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: payload.issue.number,
              });
              ref = pr.head.sha;
            }

            core.setOutput("ref", ref);
            if (ref) {
              core.info(`Checking out PR head at ${ref}`);
            } else {
              core.info("No PR in this event; checkout uses the default ref for the workflow");
            }

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          ref: ${{ steps.pr_head.outputs.ref || github.sha }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ github.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO OWNER: ${{ github.repository_owner }}
            REPO NAME: ${{ github.event.repository.name }}
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            ## Step 1: Manage Existing Review Threads

            Before posting new comments, check existing review threads on this PR.

            Fetch all review threads:
            ```
            gh api graphql -f query='
              query {
                repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                  pullRequest(number: ${{ github.event.pull_request.number || github.event.issue.number }}) {
                    reviewThreads(first: 100) {
                      nodes {
                        id
                        isResolved
                        path
                        line
                        comments(first: 10) {
                          nodes {
                            id
                            databaseId
                            author { login }
                            body
                          }
                        }
                      }
                    }
                  }
                }
              }
            '
            ```

            For each **unresolved** thread where the first comment is by `github-actions[bot]`:
            - Read the file at that path and check if the issue raised has been fixed
            - If fixed: reply explaining it's been addressed, then resolve the thread:
              ```
              gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number || github.event.issue.number }}/comments/{COMMENT_DATABASE_ID}/replies -f body="This has been addressed."
              gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_NODE_ID"}) { thread { isResolved } } }'
              ```
            - If not fixed: leave it unresolved (you may post a new comment referencing it)

            For unresolved threads by **other users**, read them for context and reply
            where you have useful input (use the reply endpoint, not new comments).

            ## Step 2: Review the PR

            IMPORTANT: Start by running `gh pr diff` to see exactly which files and lines were
            changed in this PR. ONLY review and comment on code that is part of the PR diff.
            Do NOT comment on unchanged files or pre-existing code outside the diff.

            Review the changed code with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            Note: For pull requests, the PR head commit is checked out in the working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.
            Avoid re-raising issues that are already covered by an existing unresolved thread.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)" --model opus
