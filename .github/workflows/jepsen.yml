name: Jepsen

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1

jobs:
  jepsen:
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
          EAGER_SERVICE_LOADING: "1"
          DEBUG: "0"
          LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install capnproto
        run: sudo apt-get update && sudo apt-get install -y capnproto

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Leiningen
        run: |
          curl -fsSL https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein -o /usr/local/bin/lein
          chmod +x /usr/local/bin/lein
          lein version

      - name: Cache Leiningen dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.lein
          key: lein-${{ runner.os }}-${{ hashFiles('jepsen/barka/project.clj') }}
          restore-keys: |
            lein-${{ runner.os }}-

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:4566/_localstack/health >/dev/null; then
              echo "LocalStack is up"
              exit 0
            fi
            sleep 2
          done
          echo "LocalStack did not become ready in time"
          exit 1

      - name: Build binaries
        run: cargo build

      - name: Run Jepsen tests
        run: |
          cd jepsen/barka && CLASSPATH= lein run test \
            --bin-dir ${{ github.workspace }}/target/debug \
            --num-nodes 1

      - name: Upload Jepsen results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jepsen-results
          path: jepsen/barka/store/
          retention-days: 14
