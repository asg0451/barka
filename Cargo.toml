[package]
name = "barka"
version = "0.1.0"
edition = "2024"

[dependencies]
capnp = "0.25"
capnp-rpc = "0.25"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat"] }
futures = "0.3"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
aws-sdk-s3 = "1"
aws-config = "1"

[build-dependencies]
capnpc = "0.25"
